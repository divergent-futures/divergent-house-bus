<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>__TITLE__</title>
<style>
  :root{--navy:#1f3a56;--green:#2f6b2f;--accent:#6aa84f;--rust:#8a3d17;--paper:#f7f9fb;--line:#dce3ea;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--navy);background:#eef2f6;}
  header{background:var(--navy);color:#fff;padding:18px 22px;}
  header h1{margin:0;font-size:20px;}
  header p{margin:4px 0 0;font-size:12.5px;opacity:.85;}
  .wrap{display:flex;flex-wrap:wrap;gap:18px;padding:18px;max-width:1180px;margin:0 auto;}
  .options{flex:1 1 560px;min-width:320px;}
  .summary{flex:1 1 320px;min-width:280px;position:sticky;top:12px;align-self:flex-start;max-height:calc(100vh - 24px);overflow-y:auto;}
  .cat{margin:22px 0 10px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#6b7785;border-bottom:1px solid var(--line);padding-bottom:5px;}
  .cat:first-child{margin-top:0;}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px;}
  .card h3{margin:0 0 4px;font-size:14px;color:var(--navy);}
  .card .hint{font-size:11.5px;color:#6b7785;margin:0 0 10px;}
  .opts{display:flex;flex-wrap:wrap;gap:8px;}
  .opt{border:1.5px solid var(--line);border-radius:8px;padding:8px 11px;cursor:pointer;font-size:12.5px;flex:1 1 auto;min-width:120px;transition:.12s;background:#fff;}
  .opt small{display:block;color:#7a8794;font-size:10.8px;margin-top:2px;}
  .opt:hover{border-color:var(--accent);}
  .opt.sel{border-color:var(--green);background:#eef6e9;box-shadow:0 0 0 2px #eef6e9;}
  .opt.bad{border-color:#c0392b;background:#fdf0ee;}
  .summary .card{background:#fff;}
  .sum-h{background:var(--green);color:#fff;border-radius:10px 10px 0 0;margin:-14px -16px 12px;padding:12px 16px;}
  .sum-h h3{color:#fff;margin:0;font-size:15px;}
  .big{display:flex;justify-content:space-between;align-items:baseline;margin:7px 0;}
  .big b{font-size:20px;color:var(--navy);}
  .big span{font-size:12px;color:#6b7785;}
  .big b.over{color:#c0392b;}
  .profile{background:#fbf6ec;border:1px solid #d9c9a0;border-radius:8px;padding:9px 11px;margin:10px 0;font-size:12.5px;color:var(--rust);font-weight:600;}
  .tierbox{font-size:12px;color:#3a4652;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:8px 11px;margin:8px 0;}
  .lst{font-size:11.8px;color:#3a4652;margin:8px 0 0;padding-left:16px;}
  .lst li{margin:3px 0;}
  .err{color:#c0392b;font-weight:600;}
  .wrn{color:var(--rust);}
  .flg{color:var(--rust);}
  footer{font-size:11px;color:#6b7785;text-align:center;padding:14px;}
  .note{font-size:11px;color:#8a3d17;background:#fff;border:1px dashed #d9c9a0;border-radius:8px;padding:8px 10px;margin-top:8px;}
  .invalid-banner{background:#c0392b;color:#fff;border-radius:8px;padding:8px 11px;margin:0 0 10px;font-size:12.5px;font-weight:600;display:none;}
  .reset{font-size:11px;color:#6b7785;cursor:pointer;text-decoration:underline;margin-top:8px;display:inline-block;}
</style>
</head>
<body>
<header>
  <h1 id="hdr-title"></h1>
  <p id="hdr-sub"></p>
</header>

<div class="wrap">
  <div class="options" id="options"></div>
  <div class="summary">
    <div class="card">
      <div class="sum-h"><h3 id="sum-title">Your build</h3></div>
      <div class="invalid-banner" id="banner">Invalid configuration — fix the red flags below.</div>
      <div class="profile" id="profile">—</div>
      <div class="tierbox" id="tier" style="display:none">—</div>
      <div id="metrics"></div>
      <div class="tierbox" id="skill" style="display:none">—</div>
      <ul class="lst" id="issues"></ul>
      <details id="bomwrap" style="margin-top:10px;display:none;">
        <summary style="font-size:12.5px;font-weight:600;cursor:pointer;color:var(--green);">Parts list (vendor-researched)</summary>
        <ul class="lst" id="bom"></ul>
        <div class="tierbox" id="bomtotal">—</div>
      </details>
      <span class="reset" onclick="resetDefaults()" id="resetbtn">↺ reset to defaults</span>
      <div class="note" id="footnote" style="display:none"></div>
    </div>
  </div>
</div>
<footer id="pagefoot"></footer>

<script>
// df-configurator/v1 generic engine — one engine, N products; product identity lives in CONFIG.ui
const CONFIG = /*__CONFIG__*/;

const UI = CONFIG.ui || {};
document.getElementById("hdr-title").textContent = UI.title || CONFIG.product.name + " — Configurator";
document.getElementById("hdr-sub").textContent = UI.subtitle || CONFIG.product.tagline || "";
document.getElementById("pagefoot").textContent = UI.footer || (CONFIG.product.name + " · df-configurator/v1 — data lives in " + CONFIG.product.id + ".config.json");
if (UI.resetLabel) document.getElementById("resetbtn").textContent = "↺ " + UI.resetLabel;
if (UI.note) { const n=document.getElementById("footnote"); n.textContent = UI.note; n.style.display="block"; }
if (UI.summaryTitle) document.getElementById("sum-title").textContent = UI.summaryTitle;

// metric rows
const M = UI.metrics || [];
const mwrap = document.getElementById("metrics");
M.forEach(m => {
  const d = document.createElement("div"); d.className = "big";
  d.innerHTML = `<span>${m.label}</span><b id="m_${m.id}">—</b>`;
  mwrap.appendChild(d);
});
// trailer-physics extra rows (tongue + range loss) injected after metrics if enabled
if (UI.trailerPhysics) {
  const rows = [["m_tongue","Est. tongue weight"],["m_loss","Est. tow range loss"]];
  rows.forEach(([id,label],i)=>{
    const d=document.createElement("div");d.className="big";
    d.innerHTML=`<span>${label}</span><b id="${id}">—</b>`;
    mwrap.insertBefore(d, mwrap.children[i+1] || null);
  });
  document.getElementById("skill").style.display="block";
}
if (CONFIG.tiers && CONFIG.tiers.length) document.getElementById("tier").style.display="block";

const state = {};
CONFIG.forks.forEach(f => { state[f.key] = (f.options.find(o => o.default) || f.options[0]).id; });
function matches(cond){ return Object.entries(cond).every(([k,v]) => Array.isArray(v) ? v.includes(state[k]) : state[k] === v); }
function evalRules(){ const out={forbid:[],warn:[]}; (CONFIG.rules||[]).forEach(r=>{ if(matches(r.when)) out[r.type].push(r); }); return out; }

function render(){
  const root=document.getElementById("options"); root.innerHTML="";
  const rules=evalRules();
  const badForks=new Set();
  rules.forbid.forEach(r=>Object.keys(r.when).forEach(k=>badForks.add(k+":"+state[k])));
  (CONFIG.categories||[{id:"_",label:"Options",order:1}]).slice().sort((a,b)=>a.order-b.order).forEach(cat=>{
    const forks=CONFIG.forks.filter(f=>(f.category||"_")===cat.id);
    if(!forks.length) return;
    const h=document.createElement("div"); h.className="cat"; h.textContent=cat.label; root.appendChild(h);
    forks.forEach(f=>{
      const card=document.createElement("div"); card.className="card";
      card.innerHTML=`<h3>${f.label}</h3><p class="hint">${f.hint||""}</p>`;
      const row=document.createElement("div"); row.className="opts";
      f.options.forEach(o=>{
        const el=document.createElement("div");
        const sel=state[f.key]===o.id;
        el.className="opt"+(sel?" sel":"")+((sel&&badForks.has(f.key+":"+o.id))?" bad":"");
        el.innerHTML=`${o.name}<small>${o.sub||""}</small>`;
        el.onclick=()=>{state[f.key]=o.id;render();compute();};
        row.appendChild(el);
      });
      card.appendChild(row); root.appendChild(card);
    });
  });
}

function compute(){
  // accumulate additive + multiplicative effects and sets
  const sums={}, mults={}, sets={}; const flags=[];
  CONFIG.forks.forEach(f=>{
    const o=f.options.find(o=>o.id===state[f.key]);
    Object.entries(o.effects||{}).forEach(([k,v])=>{
      if(k.endsWith("Mult")||k==="rangeMult"||k==="kwhMult"){ mults[k]=(mults[k]??1)*v; }
      else { sums[k]=(sums[k]||0)+v; }
    });
    Object.assign(sets,o.sets||{});
    if(o.note) flags.push(o.note);
  });
  const metricVal={};
  M.forEach(m=>{
    let v=(m.base||0)+(m.addKey?(sums[m.addKey]||0):0);
    if(m.multKey&&mults[m.multKey]) v*=mults[m.multKey];
    (m.extraMultKeys||[]).forEach(k=>{ if(mults[k]) v*=mults[k]; });
    v=Math.round(v);
    metricVal[m.id]=v;
    const txt=(m.money?"~$":"")+(m.money?(Math.round(v/100)*100).toLocaleString():((m.approx?"~":"")+v.toLocaleString()))+(m.unit||"");
    document.getElementById("m_"+m.id).textContent=txt;
  });

  const rules=evalRules();

  // trailer physics (data-gated)
  if(UI.trailerPhysics){
    const base=CONFIG.product.base;
    const dry=metricVal[UI.trailerPhysics.dryMetric||"dry"];
    const tongue=Math.round(dry*0.12);
    const rn=!!sets.rangeNeutral;
    const loss=rn?0:Math.max(5,(base.baseRangeLossPct||25)+(sums.dragPct||0)+Math.max(0,Math.round((dry-(base.dryWeightLb||dry))/200)));
    document.getElementById("m_tongue").textContent="~"+tongue+" lb";
    document.getElementById("m_loss").textContent=rn?"≈0% (pushes itself)":"~"+loss+"%";
    const loaded=dry+(UI.trailerPhysics.cargoLb||800);
    if(sets.maxTowLb&&loaded>sets.maxTowLb){
      if(rn) rules.warn.push({message:`Loaded weight ~${loaded.toLocaleString()} lb exceeds the nominal ${sets.maxTowLb.toLocaleString()} lb tow rating — propulsion carries the load while powered, but hitch class, braking, and state regs still apply. Verify.`});
      else rules.forbid.push({message:`Loaded weight ~${loaded.toLocaleString()} lb exceeds the ${sets.maxTowLb.toLocaleString()} lb tow rating.`});
    } else if(sets.maxTowLb&&loaded>sets.maxTowLb*0.9&&!rn) rules.warn.push({message:`Loaded weight ~${loaded.toLocaleString()} lb is within 10% of the ${sets.maxTowLb.toLocaleString()} lb tow rating.`});
    if(sets.maxTongueLb&&tongue>sets.maxTongueLb&&!rn) rules.forbid.push({message:`Est. tongue weight ${tongue} lb exceeds the ${sets.maxTongueLb} lb limit.`});
    else if(sets.maxTongueLb&&tongue>sets.maxTongueLb*0.9) rules.warn.push({message:`Est. tongue weight ${tongue} lb is close to the ${sets.maxTongueLb} lb limit.`});
    document.getElementById("m_dry")&&(document.getElementById("m_dry").className=(sets.maxTowLb&&loaded>sets.maxTowLb&&!rn)?"over":"");
    document.getElementById("m_tongue").className=(sets.maxTongueLb&&tongue>sets.maxTongueLb)?"over":"";
    // build skill
    let skill=2;
    if(state.build_class==="foamie") skill=1;
    if(state.season==="s4"||state.shower==="wet_stall"||state.roof_type==="popup_hard") skill=Math.max(skill,3);
    if((state.drivetrain&&state.drivetrain!=="none")||(state.propulsion_pack&&state.propulsion_pack!=="none")) skill=4;
    document.getElementById("skill").textContent="Build skill: "+["","Beginner — foam, glue, weekend tools","Intermediate — composite box + electrical systems","Advanced — sealed shell, full climate envelope","Expert — HV pack + propulsion + DMV paperwork"][skill];
  }

  // profile + tier
  const allDefault=CONFIG.forks.every(f=>{const d=f.options.find(o=>o.default);return d&&state[f.key]===d.id;});
  let prof="Custom build";
  for(const p of (CONFIG.profiles||[])){
    if(p.matchDefaults){ if(allDefault){prof=(p.emoji||"")+" "+p.name;break;} }
    else if(matches(p.match)){ prof=(p.emoji||"")+" "+p.name; break; }
  }
  document.getElementById("profile").textContent=prof;
  const tier=(CONFIG.tiers||[]).find(t=>matches(t.match));
  if(tier) document.getElementById("tier").textContent=`Price tier: ${tier.name} · ${tier.priceRange}`;

  document.getElementById("banner").style.display=rules.forbid.length?"block":"none";
  const ul=document.getElementById("issues"); ul.innerHTML="";
  const li=(t,cls)=>{const el=document.createElement("li");el.textContent=t;el.className=cls;ul.appendChild(el);};
  rules.forbid.forEach(r=>li("✕ "+r.message,"err"));
  rules.warn.forEach(r=>li("⚠ "+r.message,"wrn"));
  flags.forEach(n=>li("⚑ "+n,"flg"));

  // BOM (generic; base parts suppressible via UI.suppressBaseParts; per-fork parts suppressible via UI.suppressForkParts)
  const suppress=UI.suppressBaseParts&&matches(UI.suppressBaseParts);
  const dropIds=new Set();
  (UI.suppressBasePartIds||[]).forEach(r=>{ if(matches(r.when)) r.ids.forEach(i=>dropIds.add(i)); });
  const bom=suppress?[]:(CONFIG.product.baseParts||[]).filter(p=>!dropIds.has(p.id));
  const skipForks=new Set();
  (UI.suppressForkParts||[]).forEach(r=>{ if(matches(r.when)) r.forks.forEach(k=>skipForks.add(k)); });
  CONFIG.forks.forEach(f=>{ if(skipForks.has(f.key)) return; const o=f.options.find(o=>o.id===state[f.key]);(o.parts||[]).forEach(p=>bom.push(p));});
  const wrap=document.getElementById("bomwrap");
  if(bom.length){
    wrap.style.display="block";
    const bomUl=document.getElementById("bom"); bomUl.innerHTML=""; let known=0;
    bom.forEach(p=>{
      const line=`${p.name}${p.qty>1?" ×"+p.qty:""}`+(p.estUsd?` — ~$${(p.estUsd*p.qty).toLocaleString()}`:" — TBD");
      if(p.estUsd) known+=p.estUsd*p.qty;
      const el=document.createElement("li"); el.textContent=line; bomUl.appendChild(el);
    });
    document.getElementById("bomtotal").textContent=`Vendor-researched subtotal ~$${known.toLocaleString()}`+(UI.bomNote?` · ${UI.bomNote}`:"");
  } else wrap.styl
